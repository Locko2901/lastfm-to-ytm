name: Lint

on:
  push:
  pull_request:
    branches: [main]
  workflow_call:

jobs:
  python:
    name: Ruff (Python)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Install dev dependencies
        run: pip install -e ".[dev]"

      - name: Lint
        run: ruff check .

      - name: Format check
        run: ruff format --check .

  js-css:
    name: Biome (JS / CSS)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: "lts/*"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Lint & format check
        run: npm run lint

  templates:
    name: j2lint (HTML templates)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Install dev dependencies
        run: pip install -e ".[dev]"

      - name: Lint templates
        run: j2lint web/templates --extensions html --ignore jinja-statements-indentation

  templates-format:
    name: js-beautify (HTML format check)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: "lts/*"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Format check
        run: npm run format:templates && git diff --exit-code -- 'web/templates/**/*.html'

  translations:
    name: Translation catalog check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -e ".[web]"

      - name: Re-extract and update catalog
        run: |
          pybabel extract -F babel.cfg -o web/translations/messages.pot .
          pybabel update -i web/translations/messages.pot -d web/translations

      - name: Check for uncommitted changes
        run: |
          git diff --exit-code -I 'POT-Creation-Date' -- 'web/translations/**' || {
            echo "::error::Translation catalog is out of date. Run: pybabel extract -F babel.cfg -o web/translations/messages.pot . && pybabel update -i web/translations/messages.pot -d web/translations"
            exit 1
          }
