name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  python:
    name: Lint · Ruff (Python)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Install dev dependencies
        run: pip install -e ".[dev]"

      - name: Lint
        run: ruff check .

      - name: Format check
        run: ruff format --check .

  types:
    name: Lint · mypy (static types)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Install dev dependencies
        run: pip install -e ".[dev,web]"

      - name: Type check
        run: mypy

  js-css:
    name: Lint · Biome (JS / CSS)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: "lts/*"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Lint & format check
        run: npm run lint

  templates:
    name: Lint · j2lint (HTML templates)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Install dev dependencies
        run: pip install -e ".[dev]"

      - name: Lint templates
        run: j2lint web/templates --extensions html --ignore jinja-statements-indentation

  templates-format:
    name: Lint · js-beautify (HTML format check)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: "lts/*"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Format check
        run: npm run format:templates && git diff --exit-code -- 'web/templates/**/*.html'

  tests:
    name: Test · Pytest (unit)
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12", "3.13", "3.14"]
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: pip install -e ".[dev]"

      - name: Run unit tests with coverage
        run: pytest --ignore=tests/frontend --cov --cov-report=xml --cov-report=term

      - name: Upload coverage to Codecov
        if: ${{ matrix.python-version == '3.11' }}
        uses: codecov/codecov-action@v7
        with:
          files: ./coverage.xml
          token: ${{ secrets.CODECOV_TOKEN }}
          fail_ci_if_error: false

  frontend:
    name: Test · Playwright (frontend e2e)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -e ".[dev,web,web-docs]"

      - name: Install Playwright Chromium
        run: python -m playwright install --with-deps chromium

      - name: Run frontend tests
        run: pytest tests/frontend --no-cov

  release-please:
    name: release-please
    if: ${{ github.event_name == 'push' && github.ref == 'refs/heads/main' }}
    needs: [python, types, tests, frontend, js-css, templates, templates-format, docker-publish]
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    outputs:
      release_created: ${{ steps.release.outputs.release_created }}
      tag_name: ${{ steps.release.outputs.tag_name }}
      major: ${{ steps.release.outputs.major }}
      minor: ${{ steps.release.outputs.minor }}
      patch: ${{ steps.release.outputs.patch }}
    steps:
      - id: release
        uses: googleapis/release-please-action@v5
        with:
          config-file: .release-please-config.json
          manifest-file: .release-please-manifest.json

      - name: Append update guide link to release body
        if: ${{ steps.release.outputs.release_created == 'true' }}
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GH_REPO: ${{ github.repository }}
          TAG: ${{ steps.release.outputs.tag_name }}
        run: |
          set -euo pipefail
          body=$(gh release view "$TAG" --json body --jq .body)
          printf '%s\n\n---\n\n**Updating?** See the [update guide](https://locko2901.github.io/lastfm-to-ytm/docker-reference/#updating).\n' "$body" \
            | gh release edit "$TAG" --notes-file -

  docker-publish:
    name: Docker publish (GHCR + Docker Hub - dev)
    if: ${{ github.event_name == 'push' && github.ref == 'refs/heads/main' }}
    needs: [python, types, tests, frontend, js-css, templates, templates-format]
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    env:
      REGISTRY: ghcr.io
      IMAGE_NAME: ${{ github.repository }}
      DOCKERHUB_IMAGE: ${{ vars.DOCKERHUB_IMAGE }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Lowercase image name
        id: img
        run: echo "name=$(echo '${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}' | tr '[:upper:]' '[:lower:]')" >> "$GITHUB_OUTPUT"

      - name: Compute image list
        id: images
        run: |
          {
            echo "list<<EOF"
            echo "${GHCR_IMAGE}"
            if [ -n "${DOCKERHUB_IMAGE}" ]; then echo "docker.io/${DOCKERHUB_IMAGE}"; fi
            echo "EOF"
          } >> "$GITHUB_OUTPUT"
        env:
          GHCR_IMAGE: ${{ steps.img.outputs.name }}

      - name: Write COMMIT_SHA
        run: echo "${{ github.sha }}" > COMMIT_SHA

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to GHCR
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Log in to Docker Hub
        if: ${{ vars.DOCKERHUB_IMAGE != '' }}
        uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ${{ steps.images.outputs.list }}
          tags: |
            type=sha,format=short
            type=raw,value=dev
          labels: |
            org.opencontainers.image.title=lastfm-to-ytm
            org.opencontainers.image.description=Sync Last.fm listening history to YouTube Music playlists
            org.opencontainers.image.source=https://github.com/${{ github.repository }}
            org.opencontainers.image.licenses=MIT

      - name: Build and push
        uses: docker/build-push-action@v7
        with:
          context: .
          file: devops/Dockerfile
          target: production
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          provenance: false

      - name: Check if Docker Hub description changed
        if: ${{ vars.DOCKERHUB_IMAGE != '' }}
        id: desc
        env:
          BEFORE: ${{ github.event.before }}
        run: |
          set -euo pipefail
          if [ -z "${BEFORE}" ] || [ "${BEFORE}" = "0000000000000000000000000000000000000000" ]; then
            echo "No previous commit found; treating description as changed."
            echo "changed=true" >> "$GITHUB_OUTPUT"
          elif git diff --quiet "${BEFORE}" HEAD -- README.docker.md; then
            echo "README.docker.md unchanged since ${BEFORE}; skipping description sync."
            echo "changed=false" >> "$GITHUB_OUTPUT"
          else
            echo "README.docker.md changed since ${BEFORE}; will sync description."
            echo "changed=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Sync Docker Hub description
        if: ${{ vars.DOCKERHUB_IMAGE != '' && steps.desc.outputs.changed == 'true' }}
        uses: peter-evans/dockerhub-description@v5
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
          repository: ${{ env.DOCKERHUB_IMAGE }}
          short-description: "Sync Last.fm listening history to YouTube Music playlists"
          readme-filepath: ./README.docker.md

  docker-publish-release:
    name: Docker publish (GHCR + Docker Hub - release)
    needs: [release-please, docker-publish]
    if: ${{ needs.release-please.outputs.release_created == 'true' }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    env:
      REGISTRY: ghcr.io
      IMAGE_NAME: ${{ github.repository }}
      DOCKERHUB_IMAGE: ${{ vars.DOCKERHUB_IMAGE }}
    steps:
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to GHCR
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Log in to Docker Hub
        if: ${{ vars.DOCKERHUB_IMAGE != '' }}
        uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Retag dev image as release
        env:
          REGISTRY: ${{ env.REGISTRY }}
          IMAGE_NAME: ${{ env.IMAGE_NAME }}
          DOCKERHUB_IMAGE: ${{ env.DOCKERHUB_IMAGE }}
          SHA: ${{ github.sha }}
          MAJOR: ${{ needs.release-please.outputs.major }}
          MINOR: ${{ needs.release-please.outputs.minor }}
          PATCH: ${{ needs.release-please.outputs.patch }}
        run: |
          set -euo pipefail
          IMAGE="$(echo "${REGISTRY}/${IMAGE_NAME}" | tr '[:upper:]' '[:lower:]')"
          SHORT_SHA="${SHA:0:7}"
          SRC="${IMAGE}:sha-${SHORT_SHA}"
          echo "Retagging ${SRC} as release ${MAJOR}.${MINOR}.${PATCH}"
          tag_args=(
            --tag "${IMAGE}:${MAJOR}.${MINOR}.${PATCH}"
            --tag "${IMAGE}:${MAJOR}.${MINOR}"
            --tag "${IMAGE}:${MAJOR}"
            --tag "${IMAGE}:latest"
          )
          if [ -n "${DOCKERHUB_IMAGE}" ]; then
            echo "Mirroring release to docker.io/${DOCKERHUB_IMAGE}"
            tag_args+=(
              --tag "docker.io/${DOCKERHUB_IMAGE}:${MAJOR}.${MINOR}.${PATCH}"
              --tag "docker.io/${DOCKERHUB_IMAGE}:${MAJOR}.${MINOR}"
              --tag "docker.io/${DOCKERHUB_IMAGE}:${MAJOR}"
              --tag "docker.io/${DOCKERHUB_IMAGE}:latest"
            )
          fi
          docker buildx imagetools create "${tag_args[@]}" "${SRC}"
