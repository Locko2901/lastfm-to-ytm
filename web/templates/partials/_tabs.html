<div class="tabs">
  <button class="tab active" data-tab="playlist">Playlist <span class="tab-badge">{{ mappings | length }}</span></button>
  <button class="tab" data-tab="overrides">Overrides <span class="tab-badge">{{ overrides | length }}</span></button>
  <button class="tab" data-tab="blacklist">Blacklist <span class="tab-badge">{{ blacklist | length }}</span></button>
  <button class="tab" data-tab="notfound">Not Found <span class="tab-badge">{{ not_found_tracks | length }}</span></button>
  <button class="tab" data-tab="cache">Cache <span class="tab-badge">{{ cached_tracks | length }}</span></button>
</div>
