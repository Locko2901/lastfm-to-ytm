{# j2lint: disable=S7 #}
<a id="versionPill" class="version-pill" href="https://github.com/Locko2901/lastfm-to-ytm/releases" target="_blank" rel="noopener noreferrer"
  data-tooltip="{{ _('Current version') }}">
  <span class="version-pill-tag">v<span class="version-pill-current">—</span></span>
  <span class="version-pill-update" hidden>
    <svg class="version-pill-icon" width="10" height="10" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3"
      stroke-linecap="round" stroke-linejoin="round">
      <path d="M12 19V5"></path>
      <path d="m5 12 7-7 7 7"></path>
    </svg>
    <span class="version-pill-latest"></span>
  </span>
</a>

<script nonce="{{ csp_nonce }}">
  (() => {
    const pill = document.getElementById("versionPill")
    if (!pill) return
    const t = window.__i18n__ || {}
    const tr = (k) => t[k] || k

    const currentEl = pill.querySelector(".version-pill-current")
    const latestEl = pill.querySelector(".version-pill-latest")
    const updateBadge = pill.querySelector(".version-pill-update")

    fetch("/api/update-status", {
        credentials: "same-origin"
      })
      .then((r) => (r.ok ? r.json() : null))
      .then((data) => {
        if (!data) return

        if (data.current_version) {
          currentEl.textContent = data.current_version
        }

        if (data.update_available && data.latest_version) {
          latestEl.textContent = "v" + data.latest_version
          updateBadge.hidden = false
          pill.classList.add("has-update")
          if (data.release_url) pill.href = data.release_url
          pill.setAttribute(
            "data-tooltip",
            tr("Update available: %(v)s").replace("%(v)s", "v" + data.latest_version),
          )
        } else if (data.current_version) {
          pill.setAttribute(
            "data-tooltip",
            tr("Up to date (v%(v)s)").replace("%(v)s", data.current_version),
          )
        }
      })
      .catch(() => {
        /* silent */
      })
  })()

</script>
